version: '3.8'

services:
  #Container untuk Database
  db:
    image: mariadb:10.11
    container_name: ngopss_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: gin_app 
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

  #Container untuk phpMyAdmin
  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: ngopss_pma
    restart: always
    ports:
      - "8081:80" 
    environment:
      PMA_HOST: db
      MYSQL_ROOT_PASSWORD: root
    depends_on:
      - db

volumes:
  db_data: